services:
  # ── Backend (Flask API) ────────────────────────────────────────────────────
  - type: web
    name: syllabussnap-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: MONGO_URI
        sync: false          # You'll paste this in the Render dashboard
      - key: MONGO_DB_NAME
        value: syllabussnap
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_ORIGINS
        value: https://syllabussnap.onrender.com  # Update after frontend deploys

  # ── Frontend (React/Vite Static Site) ─────────────────────────────────────
  - type: web
    name: syllabussnap
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://syllabussnap-api.onrender.com/api  # Backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
